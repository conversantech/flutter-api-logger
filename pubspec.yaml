name: flutter_api_tracker
description: A production-ready API sequence debugger for Flutter. Intercepts all Dio and HTTP calls globally.
version: 1.0.0
homepage: https://github.com/conversantech/flutter-api-logger
repository: https://github.com/conversantech/flutter-api-logger
issue_tracker: https://github.com/conversantech/flutter-api-logger/issues
topics:
  - flutter
  - api
  - debugger
  - logging
  - network

platforms:
  android:
  ios:

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  path: '>=1.8.0 <2.0.0'
  path_provider: '>=2.1.0 <3.0.0'
  mailer: '>=6.0.0 <7.0.0'
  share_plus: '>=7.2.2 <14.0.0'
  shared_preferences: '>=2.2.0 <3.0.0'
  sqflite: '>=2.3.0 <3.0.0'
  uuid: '>=4.0.0 <5.0.0'

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
